<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Browse Library</h1>
  </div>

  <!-- Search & Filter -->
  <div class="card search-section">
    <div class="search-wrapper">
      <span class="material-icons search-icon">search</span>
      <input type="text" [(ngModel)]="searchTerm" placeholder="Search by title, author, or ISBN..."
        class="search-input-lg">
    </div>
    <div class="categories">
      <div class="categories">
        <button class="cat-pill" [class.active]="selectedCategory === 'All'" (click)="setCategory('All')">
          All
        </button>
        <button class="cat-pill" [class.active]="selectedCategory === 'Technology'" (click)="setCategory('Technology')">
          Technology
        </button>
        <button class="cat-pill" [class.active]="selectedCategory === 'Fiction'" (click)="setCategory('Fiction')">
          Fiction
        </button>
        <button class="cat-pill" [class.active]="selectedCategory === 'Education'" (click)="setCategory('Education')">
          Education
        </button>
        <button class="cat-pill" [class.active]="selectedCategory === 'Science'" (click)="setCategory('Science')">
          Science
        </button>
        <button class="cat-pill" [class.active]="selectedCategory === 'History'" (click)="setCategory('History')">
          History
        </button>
        <button class="cat-pill" [class.active]="selectedCategory === 'Mathematics'" (click)="setCategory('Mathematics')">
          Mathematics
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="loading" class="loading-indicator">
    <div class="spinner"></div>
    <p>Loading books...</p>
  </div>

  <!-- Books Grid -->
  <div class="books-grid" *ngIf="!loading">
    <div class="book-card" *ngFor="let book of filteredBooks">
      <div class="book-cover">
        <!-- Placeholder for book image -->
        <span class="material-icons book-placeholder">menu_book</span>
      </div>
      <div class="book-info">
        <h3 class="book-title">{{book.title}}</h3>
        <p class="book-author">by {{book.author}}</p>
        <p class="book-isbn" *ngIf="book.isbn">ISBN: {{book.isbn}}</p>
        <div class="book-meta">
          <span class="category-badge">{{book.category}}</span>
          <span [class]="book.available ? 'text-green' : 'text-red'">
            {{book.available ? 'Available (' + book.availableCopies + ')' : 'Out of Stock'}}
          </span>
        </div>
        <button class="btn-primary full-width" [disabled]="!book.available" (click)="requestBook(book)">
          {{book.available ? 'Request Book' : 'Unavailable'}}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && filteredBooks.length === 0" class="empty-books">
    <span class="material-icons">menu_book</span>
    <p>No books found</p>
  </div>
</div>
