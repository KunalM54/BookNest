<div class="page-container">



    <div class="page-header">
        <h1 class="page-title">
            <span class="material-icons page-icon">lock</span>
            Change Password
        </h1>
    </div>

    <div class="card password-card">

        <p class="error-message" *ngIf="errorMessage">
            {{ errorMessage }}
        </p>

        <form (ngSubmit)="changePassword(); $event.preventDefault()">

            <!-- Current Password -->
            <div class="form-group">
                <label>Current Password</label>

                <div class="password-field">

                    <input [type]="showCurrentPassword ? 'text' : 'password'" [(ngModel)]="form.currentPassword"
                        name="currentPassword" placeholder="Enter current password" required>

                    <button type="button" class="eye-btn" (click)="toggleCurrentPassword()">

                        <span class="material-icons">
                            {{ showCurrentPassword ? 'visibility_off' : 'visibility' }}
                        </span>

                    </button>

                </div>
            </div>

            <!-- New Password -->
            <div class="form-group">
                <label>New Password</label>

                <div class="password-field">

                    <input [type]="showNewPassword ? 'text' : 'password'" [(ngModel)]="form.newPassword"
                        name="newPassword" placeholder="Enter new password" required>

                    <button type="button" class="eye-btn" (click)="toggleNewPassword()">

                        <span class="material-icons">
                            {{ showNewPassword ? 'visibility_off' : 'visibility' }}
                        </span>

                    </button>

                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label>Confirm Password</label>

                <div class="password-field">

                    <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="form.confirmPassword"
                        name="confirmPassword" placeholder="Confirm new password" required>

                    <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">

                        <span class="material-icons">
                            {{ showConfirmPassword ? 'visibility_off' : 'visibility' }}
                        </span>

                    </button>

                </div>
            </div>

            <button type="button" class="btn-primary full-width" (click)="changePassword()">

                <span class="material-icons">save</span>
                Update Password

            </button>

        </form>

    </div>

</div>
