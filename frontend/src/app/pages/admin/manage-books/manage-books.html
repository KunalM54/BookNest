<div class="page-container">

  <div class="page-header">

    <h1 class="page-title">
      <span class="material-icons page-icon">library_books</span>
      Manage Books
    </h1>

    <button class="btn-primary">
      <span class="material-icons">add</span>
      Add New Book
    </button>

  </div>


  <!-- SEARCH -->

  <div class="card search-card">

    <div class="search-wrapper">

      <span class="material-icons search-icon">search</span>

      <input
        type="text"
        [(ngModel)]="searchTerm"
        placeholder="Search by title, author, or ISBN..."
        class="search-input">

    </div>

    <!-- CATEGORY FILTER -->

    <div class="categories">

      <button
        *ngFor="let cat of categories"
        class="cat-pill"
        [class.active]="selectedCategory === cat"
        (click)="setCategory(cat)">

        {{cat}}

      </button>

    </div>

  </div>


  <!-- BOOK TABLE -->

  <div class="card table-container">

    <table>

      <thead>
        <tr>
          <th>Cover</th>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Copies</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let book of filteredBooks">

          <td>
            <div class="book-cover-placeholder"></div>
          </td>

          <td>

            <div class="fw-bold">{{book.title}}</div>

            <small class="text-muted">
              ISBN: {{book.isbn}}
            </small>

          </td>

          <td>{{book.author}}</td>

          <td>{{book.category}}</td>

          <td>{{book.availableCopies}} / {{book.totalCopies}}</td>

          <td>

            <span
              class="status-badge"
              [ngClass]="book.availableCopies > 0 ? 'status-green' : 'status-red'">

              {{book.availableCopies > 0 ? 'Available' : 'Out of Stock'}}

            </span>

          </td>

          <td>

            <button
              class="action-btn edit"
              (click)="editBook(book)"
              title="Edit">

              <span class="material-icons">edit</span>

            </button>

            <button
              class="action-btn delete"
              (click)="deleteBook(book.isbn)"
              title="Delete">

              <span class="material-icons">delete</span>

            </button>

          </td>

        </tr>


        <!-- EMPTY STATE -->

        <tr *ngIf="filteredBooks.length === 0">

          <td colspan="7" class="empty-state">

            <span class="material-icons empty-icon">
              menu_book
            </span>

            No books found

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
