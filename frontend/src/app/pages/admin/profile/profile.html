<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">Admin Profile</h1>
  </div>

  <!-- Success/Error Messages -->
  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="profile-grid">

    <!-- LEFT PROFILE CARD -->

    <div class="card profile-card">

      <div class="avatar-large">
        {{ firstName.charAt(0) }}{{ lastName.charAt(0) }}
      </div>

      <h2 class="admin-name">{{ firstName }} {{ lastName }}</h2>

      <span class="role-badge">
        {{ role === 'ADMIN' ? 'Super Admin' : 'Student' }}
      </span>

      <p class="text-muted mt-2">
        Managed Library: Main Branch
      </p>

      <div class="info-list">

        <div class="info-item">
          <strong>Email:</strong> {{ email }}
        </div>

        <div class="info-item">
          <strong>Joined:</strong> {{ joinedDate }}
        </div>

      </div>

      <!-- CHANGE PASSWORD BUTTON -->

      <div class="profile-actions">

        <button class="action-btn secondary" routerLink="/admin/change-password">

          <span class="material-icons">lock</span>
          Change Password

        </button>

      </div>

    </div>


    <!-- RIGHT EDIT FORM -->

    <div class="card details-card">

      <h3 class="form-title">
        Update Details
      </h3>

      <form (ngSubmit)="saveProfile()">

        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="firstName" name="firstName" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="lastName" name="lastName" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="phone" name="phone" class="form-control">
        </div>

        <button type="submit" class="btn-primary full-width" [disabled]="isLoading">
          <span class="material-icons">save</span>
          {{ isLoading ? 'Saving...' : 'Save Changes' }}
        </button>

      </form>

    </div>

  </div>

</div>
