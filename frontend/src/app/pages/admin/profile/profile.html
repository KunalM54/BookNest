<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">Admin Profile</h1>
  </div>

  <div class="profile-grid">

    <!-- LEFT PROFILE CARD -->

    <div class="card profile-card">

      <div class="avatar-large">
        AD
      </div>

      <h2 class="admin-name">Administrator</h2>

      <span class="role-badge">
        Super Admin
      </span>

      <p class="text-muted mt-2">
        Managed Library: Main Branch
      </p>

      <div class="info-list">

        <div class="info-item">
          <strong>Email:</strong> admin@booknest.com
        </div>

        <div class="info-item">
          <strong>Joined:</strong> Jan 2023
        </div>

      </div>

      <!-- CHANGE PASSWORD BUTTON -->

      <div class="profile-actions">

        <button class="action-btn secondary" routerLink="/admin/change-password">

          <span class="material-icons">lock</span>
          Change Password

        </button>

      </div>

    </div>


    <!-- RIGHT EDIT FORM -->

    <div class="card details-card">

      <h3 class="form-title">
        Update Details
      </h3>

      <form>

        <div class="form-group">
          <label>First Name</label>
          <input type="text" value="System" class="form-control">
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" value="Admin" class="form-control">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" value="admin@booknest.com" class="form-control">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" value="+1 555 000 9999" class="form-control">
        </div>

        <button class="btn-primary full-width">
          <span class="material-icons">save</span>
          Save Changes
        </button>

      </form>

    </div>

  </div>

</div>
