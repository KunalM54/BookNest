<div class="toolbar-row">
  <app-global-search-bar
    [placeholder]="searchPlaceholder"
    [value]="searchTerm"
    (valueChange)="onSearchChange($event)">
  </app-global-search-bar>

  <app-sort-dropdown
    *ngIf="showSort"
    [sortBy]="sortBy"
    [options]="sortOptions"
    (sortChange)="onSortChange($event)">
  </app-sort-dropdown>
</div>
