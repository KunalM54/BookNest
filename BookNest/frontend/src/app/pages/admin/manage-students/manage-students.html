<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">
      <span class="material-icons page-icon">group</span>
      Manage Students
    </h1>
  </div>

  <div class="content-card">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <span class="material-icons">search</span>
        <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()" 
          placeholder="Search students...">
      </div>
      <div class="filters">
        <select (change)="filterStatus($event)">
          <option value="all">All Students</option>
          <option value="active">Active</option>
          <option value="blocked">Blocked</option>
        </select>
        <select (change)="sortByName($event)">
          <option value="">Sort by Name</option>
          <option value="asc">A → Z</option>
          <option value="desc">Z → A</option>
        </select>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Email</th>
            <th>Student ID</th>
            <th>Books Borrowed</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let student of paginatedStudents">
            <td>
              <div class="student-info">
                <div class="avatar">{{student.fullName.charAt(0)}}</div>
                <span class="name">{{student.fullName}}</span>
              </div>
            </td>
            <td>{{student.email}}</td>
            <td>{{student.studentId}}</td>
            <td>{{student.borrowedCount}}</td>
            <td>
              <span class="badge" [class.badge-success]="student.active" [class.badge-danger]="!student.active">
                {{student.active ? 'Active' : 'Blocked'}}
              </span>
            </td>
            <td>
              <button class="icon-btn view" (click)="viewStudent(student)" title="View">
                <span class="material-icons">visibility</span>
              </button>
              <button class="icon-btn" [class.block]="student.active" [class.activate]="!student.active" 
                (click)="student.active ? blockStudent(student) : activateStudent(student)" 
                [title]="student.active ? 'Block' : 'Activate'">
                <span class="material-icons">{{student.active ? 'block' : 'check_circle'}}</span>
              </button>
            </td>
          </tr>
          <tr *ngIf="filteredStudents.length === 0">
            <td colspan="6" class="empty-cell">
              <span class="material-icons">group_off</span>
              <p>No students found</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  <!-- Pagination -->
  <div class="pagination" *ngIf="filteredStudents.length > 0">
    <button (click)="goToPreviousPage()" [disabled]="currentPage === 1" class="page-btn">
      Previous
    </button>
    <button *ngFor="let page of pageNumbers" (click)="goToPage(page)" 
      class="page-btn" [class.active]="page === currentPage">
      {{ page }}
    </button>
    <button (click)="goToNextPage()" [disabled]="currentPage === totalPages" class="page-btn">
      Next
    </button>
  </div>
  </div>

</div>
