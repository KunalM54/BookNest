<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">
      <span class="material-icons page-icon">lock</span>
      Change Password
    </h1>
  </div>

  <div class="card password-card">

    <h3 class="form-title">Update Password</h3>

    <form (ngSubmit)="changePassword()">

      <!-- CURRENT PASSWORD -->

      <div class="form-group">

        <label>Current Password</label>

        <div class="password-field">

          <input
          [type]="showCurrent ? 'text' : 'password'"
          [(ngModel)]="form.currentPassword"
          name="currentPassword"
          class="form-control">

          <button type="button"
          class="eye-btn"
          (click)="toggleCurrent()">

            <span class="material-icons">
              {{showCurrent ? 'visibility_off' : 'visibility'}}
            </span>

          </button>

        </div>

      </div>


      <!-- NEW PASSWORD -->

      <div class="form-group">

        <label>New Password</label>

        <div class="password-field">

          <input
          [type]="showNew ? 'text' : 'password'"
          [(ngModel)]="form.newPassword"
          name="newPassword"
          class="form-control">

          <button type="button"
          class="eye-btn"
          (click)="toggleNew()">

            <span class="material-icons">
              {{showNew ? 'visibility_off' : 'visibility'}}
            </span>

          </button>

        </div>

      </div>


      <!-- CONFIRM PASSWORD -->

      <div class="form-group">

        <label>Confirm Password</label>

        <div class="password-field">

          <input
          [type]="showConfirm ? 'text' : 'password'"
          [(ngModel)]="form.confirmPassword"
          name="confirmPassword"
          class="form-control">

          <button type="button"
          class="eye-btn"
          (click)="toggleConfirm()">

            <span class="material-icons">
              {{showConfirm ? 'visibility_off' : 'visibility'}}
            </span>

          </button>

        </div>

      </div>


      <!-- ERROR -->

      <div *ngIf="errorMessage" class="error-msg">
        {{errorMessage}}
      </div>

      <!-- SUCCESS -->

      <div *ngIf="successMessage" class="success-msg">
        {{successMessage}}
      </div>


      <!-- BUTTON -->

      <button class="btn-primary full-width" [disabled]="isLoading">

        <span class="material-icons">save</span>
        {{ isLoading ? 'Updating...' : 'Update Password' }}

      </button>

    </form>

  </div>

</div>
