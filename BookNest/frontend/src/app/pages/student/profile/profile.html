<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">
      <span class="material-icons page-icon">person</span>
      My Profile
    </h1>
  </div>

  <div class="profile-grid">

    <!-- LEFT PROFILE CARD -->

    <div class="card profile-card center-text">

      <div class="avatar-large">
        {{ initials }}
      </div>

      <h2>{{ firstName }} {{ lastName }}</h2>

      <p class="text-muted">
        <span class="material-icons small-icon">school</span>
        {{ department }}
      </p>

      <div class="stats-row">

        <div class="stat-box">
          <strong>{{ read }}</strong>
          <span>Read</span>
        </div>

        <div class="stat-box">
          <strong>{{ borrowed }}</strong>
          <span>Borrowed</span>
        </div>

      </div>

      <!-- Quick Actions -->

      <div class="profile-actions">

        <button class="action-btn secondary" routerLink="/student/change-password">
          <span class="material-icons">lock</span>
          Change Password
        </button>

        <button class="action-btn outline" routerLink="/student/notices">
          <span class="material-icons">campaign</span>
          Notices
        </button>

        <button class="action-btn outline" routerLink="/student/requests">
          <span class="material-icons">assignment</span>
          My Requests
        </button>
      </div>

    </div>


    <!-- RIGHT DETAILS CARD -->

    <div class="card details-card">

      <h3>
        <span class="material-icons section-icon">badge</span>
        Personal Details
      </h3>

      <form>

        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="firstName" name="firstName" class="form-control">
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="lastName" name="lastName" class="form-control">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" class="form-control">
        </div>

        <div class="form-group">
          <label>Student ID</label>
          <input type="text" [value]="studentId" class="form-control" readonly>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="phone" name="phone" class="form-control">
        </div>

        <div class="form-group">
          <label>Department</label>
          <input type="text" [(ngModel)]="department" name="department" class="form-control">
        </div>

        <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

        <button type="button" class="btn-primary full-width" (click)="updateProfile()" [disabled]="isLoading">
          <span class="material-icons">save</span>
          {{ isLoading ? 'Saving...' : 'Update Profile' }}
        </button>

      </form>

    </div>

  </div>

</div>
