<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">
      <span class="material-icons page-icon">history</span>
      Borrowing History ({{history.length}})
    </h1>
  </div>

  <div class="card table-container">

    <table>

      <thead>
        <tr>
          <th>Book</th>
          <th>Borrowed On</th>
          <th>Returned On</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let record of history">

          <td class="book-info">
            <span class="material-icons book-icon">menu_book</span>
            {{record.title}}
          </td>

          <td>{{record.borrowDate || '-'}}</td>

          <td>{{record.returnDate || '-'}}</td>

          <td>

            <span class="status-badge status-gray"><span class="material-icons status-icon">check_circle</span>
              Returned</span>

          </td>

        </tr>

        <!-- Empty State -->
        <tr *ngIf="history.length === 0">

          <td colspan="4" class="empty-table">

            <span class="material-icons empty-icon">
              history
            </span>

            <p>No borrowing history found</p>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
