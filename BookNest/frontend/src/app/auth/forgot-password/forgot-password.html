<div class="auth-page">

    <div class="loading-overlay" *ngIf="isLoading">
        <div class="loader"></div>
    </div>

    <app-navbar></app-navbar>

    <div class="auth-content">
        <div class="card-wrapper">

            <!-- LEFT SIDE -->
            <div class="form-side">

                <h2>Reset Password</h2>

                <p class="subtitle">
                    Enter your registered email and we'll send you instructions to reset your password.
                </p>

                <form (ngSubmit)="onSubmit()">

                    <div class="input-group">
                        <label>Email</label>

                        <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required>
                    </div>

                    <p class="error-message" *ngIf="errorMessage">
                        {{ errorMessage }}
                    </p>

                    <p class="success-message" *ngIf="successMessage">
                        {{ successMessage }}
                    </p>

                    <button type="submit" class="submit-btn" [disabled]="isLoading">
                        Send Reset Link
                    </button>

                </form>

                <div class="card-footer">
                    <p>
                        Remember your password?
                        <a routerLink="/login">Back to Login</a>
                    </p>
                </div>

            </div>

            <!-- RIGHT SIDE IMAGE -->
            <div class="image-side">
                <img src="assets\forgot-password.jpg" alt="Reset Password">
            </div>

        </div>
    </div>

    <app-footer></app-footer>

</div>
